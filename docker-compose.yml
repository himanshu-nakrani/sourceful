services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: document_rag
      POSTGRES_USER: document_rag
      POSTGRES_PASSWORD: document_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U document_rag -d document_rag"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://document_rag:document_rag@postgres:5432/document_rag
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      LOG_LEVEL: INFO
      RATE_LIMIT_RPM: 120
      REQUEST_TIMEOUT_SECONDS: 60
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "backend.worker"]
    environment:
      DATABASE_URL: postgresql://document_rag:document_rag@postgres:5432/document_rag
      LOG_LEVEL: INFO
      RATE_LIMIT_RPM: 120
      REQUEST_TIMEOUT_SECONDS: 60
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://api:8000
    environment:
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
